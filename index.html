<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Upload & View</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"> 
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📸 Photo Gallery</h1>
            <p class="subtitle">Upload and view photos securely</p>
        </header>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-card">
                <div class="upload-area" id="uploadArea">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M12 15V3m0 0l-4 4m4-4l4 4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"></path>
                    </svg>
                    <h3>Drop your photos here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="fileInput" accept="image/*" multiple hidden>
                    <button class="upload-btn" id="selectBtn">Select Photos</button>
                </div>
                <div class="upload-progress" id="uploadProgress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p class="progress-text" id="progressText">Uploading...</p>
                </div>
            </div>
        </div>

        <!-- Auth Button -->
        <div class="auth-section">
            <button id="authorizeButton" class="auth-btn" style="display: none;">Authorize Access</button>
            <button id="signoutButton" class="auth-btn signout" style="display: none;">Sign Out</button>
        </div>

        <!-- Gallery Section -->
        <div class="gallery-section">
            <div class="gallery-header">
                <h2>Photo Gallery</h2>
                <button id="refreshGallery" class="refresh-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 105.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"></path>
                    </svg>
                    Refresh
                </button>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <div class="loading-message">Sign in to view photos</div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal" id="imageModal">
        <span class="modal-close" id="modalClose">&times;</span>
        <img class="modal-content" id="modalImage">
        <div class="modal-caption" id="modalCaption"></div>
    </div>

    <!-- Google API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
