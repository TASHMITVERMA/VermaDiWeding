<!DOCTYPE html>
<html>
<head>
  <title>AS Luxury Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #000000, #111111);
      color: gold;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      font-size: 34px;
      letter-spacing: 3px;
      border-bottom: 1px solid gold;
    }

    h2 {
      margin-top: 50px;
    }

    iframe {
      width: 90%;
      max-width: 700px;
      height: 500px;
      border-radius: 20px;
      border: 2px solid gold;
      box-shadow: 0 0 20px rgba(212,175,55,0.6);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      border: 2px solid gold;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px gold;
    }

    button {
      padding: 12px 30px;
      background: gold;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #d4af37;
    }
  </style>
</head>

<body>

<header>
  AS LUXURY PHOTO COLLECTION
</header>

<h2>Upload Your Photo</h2>

<iframe src="YOUR_FORM_LINK"></iframe>

<h2>Photo Gallery</h2>

<button onclick="loadGallery()">Refresh Gallery</button>

<div class="gallery" id="gallery"></div>

<script>
const folderID = "1MALLfg_ONmkh37PwJSWZW5Vl6wsfCo9_";

async function loadGallery() {
  const response = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${folderID}'+in+parents&key=YOUR_GOOGLE_API_KEY`
  );

  const data = await response.json();
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  if (!data.files) {
    gallery.innerHTML = "Enable Google Drive API Key.";
    return;
  }

  data.files.forEach(file => {
    const img = document.createElement("img");
    img.src = `https://drive.google.com/uc?id=${file.id}`;
    gallery.appendChild(img);
  });
}

loadGallery();
</script>

</body>
</html>
