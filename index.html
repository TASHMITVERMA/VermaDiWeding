<!DOCTYPE html>
<html>
<head>
  <title>AS Luxury Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #000000, #111111);
      color: gold;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      font-size: 36px;
      letter-spacing: 3px;
      font-weight: bold;
      border-bottom: 1px solid gold;
    }

    .subtitle {
      font-size: 16px;
      color: #d4af37;
      margin-top: 10px;
      opacity: 0.8;
    }

    .upload-section {
      padding: 50px 20px;
    }

    iframe {
      width: 90%;
      max-width: 700px;
      height: 600px;
      border-radius: 20px;
      border: 2px solid gold;
      box-shadow: 0 0 25px rgba(212,175,55,0.5);
    }

    .gallery-button {
      display: inline-block;
      margin-top: 40px;
      padding: 15px 40px;
      font-size: 18px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.3s;
    }

    .gallery-button:hover {
      background: #d4af37;
      transform: scale(1.05);
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 14px;
      color: #aaa;
      border-top: 1px solid #333;
    }
  </style>
</head>

<body>

<header>
  AS LUXURY PHOTO COLLECTION
  <div class="subtitle">Upload your memories</div>
</header>

<div class="upload-section">

  <iframe src="YOUR_GOOGLE_FORM_LINK"></iframe>

  <br>

  <a class="gallery-button"
     href="https://drive.google.com/drive/folders/1MALLfg_ONmkh37PwJSWZW5Vl6wsfCo9_"
     target="_blank">
     View Photo Gallery
  </a>

</div>

<footer>
  © 2026 AS Luxury Gallery. All Rights Reserved.
</footer>

</body>
</html>
